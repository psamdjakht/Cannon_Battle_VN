services:
  - type: web
    name: cannon-battle-vn
    runtime: node
    plan: free
    buildCommand: node --check server.bundle.js && node --check public/js/game.js
    startCommand: node server.bundle.js
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20.19.5
